---
name: Archive to R2
permissions: {}

# Manual-only: pulls the artifacts from an already-completed CI run and copies them into
# Cloudflare R2, so build outputs can be kept without relying on GitHub Actions artifact
# storage. Does not affect the normal CI pipeline (ci.yml and friends) in any way.
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: >-
          The CI run whose artifacts should be archived. Copy this from the run's URL:
          github.com/<owner>/<repo>/actions/runs/<run_id>
        required: true
        type: string
      artifact_pattern:
        description: >-
          Glob passed to actions/download-artifact's `pattern` input. Defaults to
          everything; use e.g. "build-*" to archive only the build outputs, or
          "coverage-*" for only coverage reports.
        required: false
        type: string
        default: "*"

jobs:
  archive:
    name: Archive run ${{ inputs.run_id }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
    env:
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
    steps:
      - name: Validate R2 configuration
        run: |
          if [ -z "${R2_BUCKET}" ] || [ -z "${R2_ENDPOINT}" ]; then
            echo "::error::vars.R2_BUCKET and vars.R2_ENDPOINT must be set in this repository's Actions settings (Settings > Secrets and variables > Actions > Variables)."
            exit 1
          fi

      - name: Download artifacts from run ${{ inputs.run_id }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          run-id: ${{ inputs.run_id }}
          github-token: ${{ github.token }}
          pattern: ${{ inputs.artifact_pattern }}
          path: artifacts
          merge-multiple: false

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp --recursive artifacts/ "s3://${R2_BUCKET}/runs/${{ inputs.run_id }}/" \
            --endpoint-url "${R2_ENDPOINT}"

      - name: Summary
        run: |
          echo "### Archived to R2 :package:" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Source run: [${{ inputs.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ inputs.run_id }})" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Destination: \`s3://${R2_BUCKET}/runs/${{ inputs.run_id }}/\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Files:" >> "${GITHUB_STEP_SUMMARY}"
          find artifacts -type f -printf '- `%P`\n' | sort >> "${GITHUB_STEP_SUMMARY}"
